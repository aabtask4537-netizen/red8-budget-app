```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RED8</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:'DM Sans',sans-serif;background:#0D0D0D;color:#F0EDE8}
.list-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid #2A2A2A}
.delete-btn{cursor:pointer;margin-left:10px;opacity:.6}
.delete-btn:hover{opacity:1}
.add-form{display:none}
.add-form.open{display:block}
</style>
</head>

<body>

<h2>RED8 - Newborn Tracker</h2>

<button onclick="toggleForm()">+ Add Item</button>

<div class="add-form" id="form">
  <input id="name" placeholder="Item name">
  <input id="amount" type="number" placeholder="Amount">
  <input id="category" placeholder="Category">
  <button onclick="addItem()">Save</button>
</div>

<div id="list"></div>

<script>
// ===== STORAGE =====
function saveData(key,data){
  localStorage.setItem(key, JSON.stringify(data));
}

function loadData(key){
  const d = localStorage.getItem(key);
  return d ? JSON.parse(d) : [];
}

// ===== UI =====
function toggleForm(){
  document.getElementById('form').classList.toggle('open');
}

// ===== ADD =====
function addItem(){
  const name = document.getElementById('name').value;
  const amount = document.getElementById('amount').value;
  const category = document.getElementById('category').value;

  if(!name || !amount) return;

  const items = loadData('items');

  items.push({
    name,
    amount: parseFloat(amount),
    category
  });

  saveData('items', items);
  render();

  document.getElementById('name').value='';
  document.getElementById('amount').value='';
  document.getElementById('category').value='';
}

// ===== DELETE =====
function deleteItem(index){
  const items = loadData('items');
  items.splice(index,1);
  saveData('items', items);
  render();
}

// ===== RENDER =====
function render(){
  const list = document.getElementById('list');
  list.innerHTML='';

  const items = loadData('items');

  items.forEach((i,index)=>{
    const el = document.createElement('div');
    el.className='list-item';

    el.innerHTML = `
      <div>${i.name} (${i.category})</div>
      <div>$${i.amount.toFixed(2)}</div>
      <div class="delete-btn" onclick="deleteItem(${index})">🗑️</div>
    `;

    list.appendChild(el);
  });
}

// ===== LOAD =====
window.onload = render;
</script>

</body>
</html>
```
